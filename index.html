<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan Bootstrap</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#"></a>
        </div>
    </nav>
    <h1>Latihan Bootstrap</h1>
    <div class="container mt-5">
        <div class="row">
            <div class="col-md-3 col-6 bg-info-subtle text-info-emphasis p-3">Kolom 1</div>
            <div class="col-md-3 col-6 bg-primary-subtle text-primary-emphasis p-3">Kolom 2</div>
            <div class="col-md-3 col-6 bg-primary-subtle text-primary-emphasis p-3">Kolom 3</div>
            <div class="col-md-3 col-6 bg-info-subtle text-info-emphasis p-3">Kolom 4</div>
        </div>
    </div>
    <div class="container mt-5">
        <div class="row">
            <div class="col-md-2">
                <div class="card shadow p-3">
                    <img src="img/joong.jpg" class="img-fluid" alt="">
                </div>
            </div>
            <div class="col md-9">
                <div class="card shadow p-5">
                    <h1 class="text-center fw-bold p-4">Profil Saya</h1>
                    <p class="text-muted text-center">Web Developer</p>
                </div>
            </div>
        </div>
    </div>
    <div class="container mt-5">
        <div class="row">
            <div class="col md-4">
                <div class="card" style="width: 18rem;">
                    <img src="img/Cookies.webp" class="card-img-top">
                    <div class="card-body">
                        <h5 class="card-title">Prouduk 1</h5>
                        <p class="card-text">Biskuit.</p>
                        <a href="#" class="btn btn-primary" data-bs-toggle="modal"
                            data-bs-target="#exampleModal">Beli</a>
                    </div>
                </div>
            </div>
            <div class="col md-4">
                <div class="card" style="width: 18rem;">
                    <img src="img/pastry.webp" class="card-img-top">
                    <div class="card-body">
                        <h5 class="card-title">Prouduk 2</h5>
                        <p class="card-text">Pastry.</p>
                        <a href="#" class="btn btn-primary" data-bs-toggle="modal"
                            data-bs-target="#exampleModal">Beli</a>

                    </div>
                </div>
            </div>
            <div class="col md-4">
                <div class="card" style="width: 18rem;">
                    <img src="img/cake.webp" class="card-img-top">
                    <div class="card-body">
                        <h5 class="card-title">Prouduk 3</h5>
                        <p class="card-text">Korean Cake.</p>
                        <a href="#" class="btn btn-primary" data-bs-toggle="modal"
                            data-bs-target="#exampleModal">Beli</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="container mt-5">
        <form class="needs-validation" novalidate>
            <div class="mb-3">
                <label class="form-label">Nama</label>
                <input type="text" class="form-control" required>
                <div class="invalid-feedback">
                    Nama wajib diisi!!
                </div>
            </div>
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" required>
            <div class="invalid-feedback">
                Email wajib diisi!!
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">Pasword</label>
            <input type="password" class="form-control" required>
            <div class="invalid-feedback">
                Pasword wajib diisi!!
            </div>
        </div>
        <button class="btn btn-primary">Submit</button>
        </form>
    </div>
    <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="exampleModalLabel">Tambah ke Keranjang</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    Tambahkan Produk
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary">Save changes</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/bootstrap.min.js"></script>
    <script>(() => {
            'use strict'

            // Fetch all the forms we want to apply custom Bootstrap validation styles to
            const forms = document.querySelectorAll('.needs-validation')

            // Loop over them and prevent submission
            Array.from(forms).forEach(form => {
                form.addEventListener('submit', event => {
                    if (!form.checkValidity()) {
                        event.preventDefault()
                        event.stopPropagation()
                    }

                    form.classList.add('was-validated')
                }, false)
            })
        })()
    </script>

</body>

</html>
